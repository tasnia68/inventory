spring:
  application:
    name: inventory-system
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/inventory_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
      connect-timeout: 3000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3

app:
  # Scalability infra (Redis cache + distributed lock, RabbitMQ async sync worker).
  # OFF in dev/test so the suite needs no Redis/RabbitMQ running; ON in deploy.
  scaling:
    enabled: ${APP_SCALING_ENABLED:false}
  storefront:
    domains:
      platform-base-domain: ${APP_STOREFRONT_BASE_DOMAIN:localhost}
      admin-domain: ${APP_ADMIN_DOMAIN:localhost}
      verification-target: ${APP_STOREFRONT_VERIFICATION_TARGET:localhost}
  # Hybrid (Bridge) multi-tenant DB routing. Master flag is OFF until Phase 2
  # sign-off; Phases 0/1 only build infra. KEK comes from the environment and
  # is never persisted (see CredentialCipher).
  tenant:
    routing:
      enabled: ${APP_TENANT_ROUTING_ENABLED:false}
      shared-identifier: __shared__
      kek: ${MASTERINVENTORY_TENANT_KEK:}
      key-id: ${MASTERINVENTORY_TENANT_KEK_ID:env:v1}
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000 # 24 hours
      refresh-token:
        expiration: 604800000 # 7 days
    cors:
      allowed-origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
        - http://localhost:5174
        - http://127.0.0.1:5174
        - http://localhost:4173
        - http://127.0.0.1:4173

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    redis:
      enabled: ${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
    rabbit:
      enabled: ${MANAGEMENT_HEALTH_RABBIT_ENABLED:false}

logging:
  pattern:
    level: "%5p [tenant:%X{tenant_id:-na}] [request:%X{request_id:-na}] [user:%X{user_name:-anonymous}]"

bucket4j:
  enabled: false
  filters:
    - cache-name: rate-limit-bucket
      url: /api/.*
      rate-limits:
        - bandwidths:
            - capacity: 100
              time: 1
              unit: minutes
